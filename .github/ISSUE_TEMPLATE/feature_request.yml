name: Feature Request
description: Propose a focused improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, business, or operational problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: How should this be tested or measured?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Security
        - Performance
        - SEO
        - UX
        - Conversion
        - Documentation
        - Architecture
        - Operations
    validations:
      required: true
